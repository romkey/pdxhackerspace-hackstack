services:
  mosquitto:
    image: eclipse-mosquitto:${IMAGE_VERSION:-latest}
    container_name: mosquitto
    hostname: mosquitto
    restart: unless-stopped
    volumes:
      - ./config:/mosquitto/config
      - ../../lib/mosquitto:/mosquitto/data
      - ../../log/mosquitto:/mosquitto/log
# ports need to be exposed in order to be available to LAN
    ports:
      - 1883:1883
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mosquitto_sub -h localhost -p 1883 -t '$$SYS/broker/uptime' -C 1 -W 3 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - mqtt
networks:
  mqtt:
    name: mosquitto-net
