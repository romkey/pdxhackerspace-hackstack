services:
  music-assistant:
    container_name: music-assistant
    hostname: music-assistant
    image: ghcr.io/music-assistant/server:${IMAGE_VERSION:-stable}
    restart: unless-stopped
    privileged: true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ../../lib/music-assistant:/data
      - /media/nas/music:/media
    network_mode: host
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
    security_opt:
      - apparmor:unconfined
#    networks:
#      - proxy
#      - mdns
#      - hass
    ports:
      - 8095:8095
      - 8096:8096
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8095/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

networks:
  proxy:
    name: nginx-proxy-net
    external: true
  hass:
    name: hass-net
    external: true
  mdns:
    external: true
    name: mdns-net
