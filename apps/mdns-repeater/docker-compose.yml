services:
  mdns-repeater:
    image: monstrenyatko/mdns-repeater:${IMAGE_VERSION:-latest}
    container_name: mdns-repeater
    hostname: mdns-repeater
    restart: unless-stopped
    command: mdns-repeater-app -f -d eth0 eth1
    networks:
      - ipvlan_net
      - mdns
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[m]dns-repeater' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
networks:
  ipvlan_net:
    driver: ipvlan
    driver_opts:
      parent: "${NETWORK_INTERFACE}"
#    ipam:
#      config:
#        - subnet: 192.168.1.0/24
#          gateway: 192.168.1.1
  mdns:
    name: mdns-net
