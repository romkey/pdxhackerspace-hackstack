services:
  partdb:
    image: jbtronics/part-db1:${IMAGE_VERSION:-latest}
    container_name: partdb
    hostname: partdb
    restart: unless-stopped
#    ports:
#      - 28080:80
    networks:
      - proxy
      - db
    volumes:
      - ../../lib/partdb/uploads:/var/www/html/uploads
      - ../../lib/partdb/public_media:/var/www/html/public/media
      - ../../lib/partdb/db:/var/www/html/var/db
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
networks:
  proxy:
    name: nginx-proxy-net
    external: true
  db:
    name: postgres-net
    external: true
