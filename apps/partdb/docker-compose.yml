services:
  partdb:
    image: jbtronics/part-db1:${IMAGE_VERSION:-latest}
    container_name: partdb
    hostname: partdb
    restart: unless-stopped
#    ports:
#      - 28080:80
    networks:
      - proxy
      - db
    volumes:
      - ../../lib/partdb/uploads:/var/www/html/uploads
      - ../../lib/partdb/public_media:/var/www/html/public/media
      - ../../lib/partdb/db:/var/www/html/var/db
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -fSs http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
networks:
  proxy:
    name: nginx-proxy-net
    external: true
  db:
    name: postgres-net
    external: true
