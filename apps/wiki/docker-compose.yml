services:
  wiki:
    image: ghcr.io/requarks/wiki:${IMAGE_VERSION:-latest}
    container_name: wiki
    hostname: wiki
    restart: unless-stopped
    networks:
      proxy: null
      db: null
    volumes:
      - ./config.yml:/wiki/config.yml
      - ../../lib/wikijs:/wiki/data
#    ports:
#      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fSs http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  proxy:
    external: true
    name: nginx-proxy-net
  db:
    external: true
    name: postgres-net
