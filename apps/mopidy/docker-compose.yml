# https://hub.docker.com/r/buvis/mopidy
services:
  mopidy:
    image: buvis/mopidy:${IMAGE_VERSION:-latest}
    container_name: mopidy
    hostname: mopidy
    restart: unless-stopped
    privileged: true
    networks:
      - proxy
      - mdns
    volumes:
      - ../../lib/mopidy:/app:rw
      - ../../run/mopidy:/app/cache
      - ./config:/config:ro
      - /media/nas/music:/media
    user: 84044:audio
    ports:
      - 6600:6600
      - 6680:6680
    healthcheck:
      test: ["CMD-SHELL", "curl -fSs http://127.0.0.1:6680/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  proxy:
    external: true
    name: nginx-proxy-net
  mdns:
    external: true
    name: mdns-net
