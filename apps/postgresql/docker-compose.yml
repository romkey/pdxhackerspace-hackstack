services:
  postgresql: &base
    image: postgres:${IMAGE_VERSION:-16}
    hostname: postgresql
    container_name: postgresql
    restart: unless-stopped
    networks:
      - db
      - proxy
    volumes:
      - ../../lib/postgresql:/var/lib/postgresql/data
      - ../../log/postgresql:/var/log/postgresql/
    shm_size: 128mb
    env_file:
      - .env

networks:
  db:
    name: postgres-net
  proxy:
    name: nginx-proxy-net
    external: true
