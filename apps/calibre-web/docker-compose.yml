services:
  calibre-web:
    image: lscr.io/linuxserver/calibre-web:${IMAGE_VERSION:-latest}
    container_name: calibre-web
    hostname: calibre-web
    restart: unless-stopped
    volumes:
      - ../../lib/calibre-web/config:/config
      - ../../lib/calibre-web/books:/books
#    ports:
#      - 8083:8083
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -fSs http://127.0.0.1:8083/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - proxy
networks:
  proxy:
    external: true
    name: nginx-proxy-net
