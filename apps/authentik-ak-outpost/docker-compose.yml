services:
  ak-outpost:
    image: ghcr.io/goauthentik/proxy:${IMAGE_VERSION:-latest}
    container_name: ak-outpost
    hostname: ak-outpost
    restart: unless-stopped
#    ports:
#      - 9000:9000
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 2 bash -c '</dev/tcp/127.0.0.1/9000' || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - proxy
networks:
  proxy:
    external: true
    name: nginx-proxy-net
