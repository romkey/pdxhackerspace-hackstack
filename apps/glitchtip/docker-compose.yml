services:
  glitchtip-redis:
    image: redis:${REDIS_IMAGE_VERSION:-7-alpine}
    container_name: glitchtip-redis
    hostname: glitchtip-redis
    restart: unless-stopped
    volumes:
      - ../../lib/glitchtip/redis:/data
    networks:
      - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  glitchtip:
    image: glitchtip/glitchtip:${IMAGE_VERSION:-latest}
    container_name: glitchtip
    hostname: glitchtip
    restart: unless-stopped
    volumes:
      - ../../lib/glitchtip/uploads:/code/uploads
#   ports:
#     - 8000:8000
    env_file:
      - .env
    networks:
      - db
      - proxy
      - redis
      - mail
    depends_on:
      glitchtip-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fSs http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  glitchtip-worker:
    image: glitchtip/glitchtip:${IMAGE_VERSION:-latest}
    container_name: glitchtip-worker
    hostname: glitchtip-worker
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    volumes:
      - ../../lib/glitchtip/uploads:/code/uploads
    env_file:
      - .env
    networks:
      - db
      - redis
      - mail
    depends_on:
      glitchtip-redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  glitchtip-migrate:
    image: glitchtip/glitchtip:${IMAGE_VERSION:-latest}
    container_name: glitchtip-migrate
    hostname: glitchtip-migrate
    restart: "no"
    command: ./manage.py migrate
    env_file:
      - .env
    networks:
      - db
      - redis
    depends_on:
      glitchtip-redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy:
    external: true
    name: nginx-proxy-net
  db:
    external: true
    name: postgres-net
  mail:
    external: true
    name: postfix-net
  redis:
    name: glitchtip-redis-net
