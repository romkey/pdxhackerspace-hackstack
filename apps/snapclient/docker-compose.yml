# https://hub.docker.com/r/ivdata/snapclient
services:
  snapclient:
    image: ivdata/snapclient:${IMAGE_VERSION:-latest}
    container_name: snapclient
    hostname: snapclient
    restart: unless-stopped
    devices:
      - ${SOUND_DEVICE}
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[s]napclient' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
