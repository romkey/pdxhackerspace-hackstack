services:
  caddy-home-assistant-liar:
    image: caddy:${IMAGE_VERSION:-latest}
    container_name: caddy-home-assistant-liar
    hostname: caddy-home-assistant-liar
    restart: unless-stopped
#    ports:
#      - 80:80
    volumes:
      - ./config:/etc/caddy
      - ../../lib/caddy-home-assistant-liar/data:/data
      - ../../lib/caddy-home-assistant-liar/config:/config
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:2019/config/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - proxy
      - hass
      - caddy

networks:
  proxy:
    external: true
    name: nginx-proxy-net
  hass:
    external: true
    name: hass-net
  caddy:
    name: caddy-home-assistant-liar-net
