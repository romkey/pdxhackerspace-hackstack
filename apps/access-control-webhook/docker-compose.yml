# https://github.com/thecatlady/docker-webhook
services:
  access-control-webhook:
    build: .
    container_name: access-control-webhook
    hostname: access-control-webhook
    restart: unless-stopped
    command: -verbose -hooks=hooks.json -hotreload
    env_file:
      - .env
    volumes:
      - ./config:/config:ro
#    ports:
#      - 9000:9000
#      - 9001:9001
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
networks:
  proxy:
    external: true
    name: nginx-proxy-net
