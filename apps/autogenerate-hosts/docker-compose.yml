services:
  autogenerate-hosts:
    image: ghcr.io/romkey/pdxhackerspace-hackstack-autogenerate-hosts:${IMAGE_VERSION:-latest}
    container_name: autogenerate-hosts
    hostname: autogenerate-hosts
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - "${DB_PATH}:${DB_PATH}"
      - "${HOSTSFILE_PATH}:/dest"
    networks:
      - autogenerate-hosts
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[g]enerate_hosts' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  autogenerate-hosts:
    name: autogenerate-hosts-net
