services:
  geowiki:
    image: ghcr.io/romkey/pdxhackerspace-geowiki:${IMAGE_VERSION:-latest}
    container_name: geowiki
    hostname: geowiki
    restart: unless-stopped
    volumes:
      - ../../lib/geowiki:/app/storage
      - ../../log/geowiki:/app/log
    env_file:
      - .env
    networks:
      - db
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "curl -fSs http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  proxy:
    external: true
    name: nginx-proxy-net
  db:
    external: true
    name: postgres-net
