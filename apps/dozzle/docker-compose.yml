services:
  dozzle:
    image: amir20/dozzle:${IMAGE_VERSION:-latest}
    container_name: dozzle
    hostname: dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
#    ports:
#      - 8080:8080
    networks:
      - proxy
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 3s
      timeout: 30s
      retries: 5
      start_period: 30s

networks:
  proxy:
    name: nginx-proxy-net
    external: true
