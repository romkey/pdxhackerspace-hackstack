services:
  z-wave:
    image: zwavejs/zwave-js-ui:${IMAGE_VERSION:-latest}
    container_name: z-wave
    hostname: z-wave
    restart: unless-stopped
    devices:
      - "${CONTROLLER_DEVICE}:/dev/zwave"
    volumes:
      - ../../lib/z-wavejs:/usr/src/app/store
    healthcheck:
      test: ["CMD-SHELL", "curl -fSs http://127.0.0.1:8091/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - hass
      - proxy
#    ports:
#      - 8091:8091
#      - 3000:3000
networks:
  hass:
    name: hass-net
    external: true
  proxy:
    name: nginx-proxy-net
    external: true
