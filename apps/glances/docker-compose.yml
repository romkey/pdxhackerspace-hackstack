services:
  glances:
    image: nicolargo/glances:${IMAGE_VERSION:-latest}
    container_name: glances
    hostname: glances
    privileged: true
    pid: host
    restart: unless-stopped
    networks:
      proxy: null
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./glances.conf:/glances/conf/glances.conf
      - ./glances.pwd:/root/.config/glances/glances.pwd:ro
      - /etc/os-release:/etc/os-release:ro
#    ports:
#      - 61208:61208
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
networks:
  proxy:
    external: true
    name: nginx-proxy-net
