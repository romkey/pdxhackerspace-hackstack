services:
  zigbee2mqtt:
#    image: koenkk/zigbee2mqtt:2.0.0
    image: koenkk/zigbee2mqtt:${IMAGE_VERSION:-latest}
    container_name: zigbee2mqtt
    hostname: zigbee2mqtt
    restart: unless-stopped
    devices:
      - "${CONTROLLER_DEVICE}:/dev/ttyACM0"
    volumes:
      - ./data:/app/data
      - /run/udev:/run/udev:ro
#    ports:
#      - 8080:8080
    env_file:
      - .env
    networks:
      - proxy
      - mqtt
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
networks:
  proxy:
    name: nginx-proxy-net
    external: true
  mqtt:
    name: mosquitto-net
    external: true
