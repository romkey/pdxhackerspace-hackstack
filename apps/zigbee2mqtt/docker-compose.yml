services:
  zigbee2mqtt:
    image: koenkk/zigbee2mqtt:${IMAGE_VERSION:-latest}
    container_name: zigbee2mqtt
    hostname: zigbee2mqtt
    restart: unless-stopped
    devices:
      - "${CONTROLLER_DEVICE}:/dev/ttyzig0"
    volumes:
      - ./config:/app/data
      - /run/udev:/run/udev:ro
#    ports:
#      - 8080:8080
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - proxy
      - mqtt
networks:
  proxy:
    name: nginx-proxy-net
    external: true
  mqtt:
    name: mosquitto-net
    external: true
