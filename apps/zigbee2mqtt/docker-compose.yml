services:
  zigbee2mqtt:
    image: koenkk/zigbee2mqtt:${IMAGE_VERSION:-latest}
    container_name: zigbee2mqtt
    hostname: zigbee2mqtt
    restart: unless-stopped
    devices:
      - "${CONTROLLER_DEVICE}:/dev/ttyzig0"
    volumes:
      - ./config:/app/data
      - /run/udev:/run/udev:ro
#    ports:
#      - 8080:8080
    env_file:
      - .env
    networks:
      - proxy
      - mqtt
networks:
  proxy:
    name: nginx-proxy-net
    external: true
  mqtt:
    name: mosquitto-net
    external: true
