services:
  sensors2mqtt:
    image: kevinpdavid/sensors2mqtt:${IMAGE_VERSION:-main}
    container_name: sensors2mqtt
    hostname: sensors2mqtt
    privileged: true
    restart: unless-stopped
    networks:
      - mqtt
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities:
                - gpu
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
networks:
  mqtt:
    name: mosquitto-net
    external: true
