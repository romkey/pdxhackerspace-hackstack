services:
  backrest:
    image: garethgeorge/backrest
    container_name: backrest
    hostname: backrest
    volumes:
      - ./config:/config
      - ../../lib/backrest:/data
      - /backups/chaos/backrest/cache:/cache
      - /backups/chaos/backrest/repos:/repos
      - /opt/hackstack:/userdata
      - /etc:/useretc
      - /home:/userhome
    env_file:
      - .env
    restart: unless-stopped
#    ports:
#      - 9898:9898
networks:
  default:
    external: true
    name: nginx-proxy-net
volumes:
  backups:
    driver: local
    driver_opts:
      type: nfs
      o: nfsvers=4,addr=nas.ctrlh,rw
      device: ":/backups/ummon/restic"
