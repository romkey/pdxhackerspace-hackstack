services:
  backrest:
    image: garethgeorge/backrest:${IMAGE_VERSION:-latest}
    container_name: backrest
    hostname: backrest
    volumes:
      - ./config:/config
      - ../../lib/backrest:/data
      - ${BACKREST_CACHE_PATH}:/cache
      - ${BACKREST_REPOS_PATH}:/repos
      - ${BACKREST_USERDATA_PATH:-/opt}:/userdata
      - ${BACKREST_USERETC_PATH:-/etc}:/useretc
      - ${BACKREST_USERHOME_PATH:-/home}:/userhome
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - proxy
#    ports:
#      - 9898:9898
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
networks:
  proxy:
    external: true
    name: nginx-proxy-net
volumes:
  backups:
    driver: local
    driver_opts:
      type: nfs
      o: nfsvers=4,addr=nas.cats,rw
      device: ":/backups/ummon/restic"
