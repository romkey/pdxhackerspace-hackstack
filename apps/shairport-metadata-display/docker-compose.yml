# https://github.com/AlainGourves/shairport-metadata-display
services:
  shairport-metadata-display:
    build: .
    container_name: shairport-metadata-display
    hostname: shairport-metadata-display
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ../../run/shairport-sync/fifos:/tmp/shairport-sync-metadata
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
