services:
  esphome:
    image: ghcr.io/esphome/esphome:${IMAGE_VERSION:-latest}
    container_name: esphome
    hostname: esphome
    volumes:
      - ../../lib/esphome:/config
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    privileged: true
    networks:
      - proxy
      - mdns
#    ports:
#      - 6052:6052
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -fSs http://127.0.0.1:6052/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
networks:
  proxy:
    external: true
    name: nginx-proxy-net
  mdns:
    external: true
    name: mdns-net
