# https://github.com/open-webui/open-webui/blob/main/docker-compose.yaml
services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:${IMAGE_VERSION:-latest}
    container_name: openwebui
    hostname: openwebui
    restart: unless-stopped
    ports:
      - 3000:8080
    networks:
      - proxy
      - llama
    volumes:
      - ../../lib/openwebui:/app/backend/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -fSs http://127.0.0.1:8080/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
networks:
  proxy:
    name: nginx-proxy-net
    external: true
  llama:
    name: llama-net
    external: true
