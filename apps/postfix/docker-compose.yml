# usage:
#     docker compose up postfix -d
#     docker compose exec postfix mailq
services:
  postfix-base: &base
    image: boky/postfix:${IMAGE_VERSION:-latest}
    restart: "no"
    volumes:
      - ../../lib/postfix/spool:/var/spool/postfix:rw
      - ../../lib/postfix/sasldb2:/etc/sasldb2
#      - ../../lib/postfix/sasl:/etc/sasl2
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postfix:
    <<: *base
    hostname: postfix
    container_name: postfix
    restart: unless-stopped
    ports:
      - 25:25
      - 587:587
    networks:
      - mail
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mailq:
    <<: *base
    container_name: mailq
    restart: "no"
    command: mailq
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  mail:
    name: postfix-net
