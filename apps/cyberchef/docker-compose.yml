services:
  cyberchef:
    image: ghcr.io/gchq/cyberchef:${IMAGE_VERSION:-latest}
    container_name: cyberchef
    hostname: cyberchef
    restart: unless-stopped
    networks:
      - proxy
#    ports:
#      - 8090:80
    healthcheck:
      test: ["CMD-SHELL", "curl -fSs http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
networks:
  proxy:
    external: true
    name: nginx-proxy-net
