services:
  ollama:
    image: ollama/ollama:${IMAGE_VERSION:-latest}
    container_name: ollama
    hostname: ollama
    restart: unless-stopped
    volumes:
      - ../../lib/ollama:/root/.ollama
    ports:
      - 11434:11434
    networks:
      - llama
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:11434')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: "${GPU_COUNT}"
              capabilities: [gpu]
networks:
  llama:
    name: llama-net
