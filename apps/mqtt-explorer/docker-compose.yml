services:
  mqtt-explorer:
    image: smeagolworms4/mqtt-explorer:${IMAGE_VERSION:-latest}
    container_name: mqtt-explorer
    hostname: mqtt-explorer
    restart: unless-stopped
    networks:
      - proxy
      - mqtt
    volumes:
      - ./config:/mqtt-explorer/config
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:4000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
networks:
  proxy:
    external: true
    name: nginx-proxy-net
  mqtt:
    external: true
    name: mosquitto-net
