services:
  mqtt-explorer:
    image: smeagolworms4/mqtt-explorer:${IMAGE_VERSION:-latest}
    container_name: mqtt-explorer
    hostname: mqtt-explorer
    restart: unless-stopped
    networks:
      - proxy
      - mqtt
    volumes:
      - ./config:/mqtt-explorer/config
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
networks:
  proxy:
    external: true
    name: nginx-proxy-net
  mqtt:
    external: true
    name: mosquitto-net
