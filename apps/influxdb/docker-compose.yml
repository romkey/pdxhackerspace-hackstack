services:
  influxdb:
    image: influxdb:${IMAGE_VERSION:-2}
    container_name: influxdb
    hostname: influxdb
    restart: unless-stopped
#    ports:
#      - 8086:8086
    volumes:
      - ../../lib/influxdb:/var/lib/influxdb2
      - ./config:/etc/influxdb2
    env_file:
      - .env
    networks:
      - influxdb
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
networks:
  influxdb:
    name: influxdb-net
