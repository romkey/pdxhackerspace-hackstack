# --- Dynamic daily filename ---
template(name="AccessLogDaily" type="string"
         string="/var/log/access/%$year%-%$month%-%$day%.log")

# --- Line format with timestamp ---
template(name="AccessLine" type="string"
         string="%timestamp:::date-rfc3339% %hostname% %programname%[%procid%]: %msg%\n")

# --- Capture all accesscontrol messages ---
if $programname == 'accesscontrol' then {
    # 1. Log to a dated file
    action(type="omfile" dynaFile="AccessLogDaily" template="AccessLine")

    # 2. Run a shell script
    action(type="omprog"
        binary="/scripts/access-event.sh"
        template="AccessLine"          # feed exactly what goes to the log file
        # Optional: give this action its own queue so logging isn't blocked by the script
        action.resumeRetryCount="-1"   # retry forever if the script is temporarily failing
        queue.type="LinkedList"
        queue.size="10000"
        queue.dequeueBatchSize="100"
        queue.workerThreads="1"
        queue.highWatermark="8000"
        queue.lowWatermark="2000"
        queue.timeoutEnqueue="0"       # drop never; set >0 if you prefer to drop on backpressure
    )

    stop
}
