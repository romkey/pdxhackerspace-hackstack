services:
  db-backup:
    image: ghcr.io/romkey/hackstack-db-backup:${IMAGE_VERSION:-latest}
    container_name: db-backup
    hostname: db-backup
    restart: unless-stopped
    user: "${BACKUP_UID:-0}:${BACKUP_GID:-0}"
    env_file:
      - .env
    volumes:
      - ${DBBACKUP_PARENT_HOST_PATH}:/opt:ro
      - backup_nfs:/dest
    networks:
      - postgresql
      - mariadb
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[b]ackup.rb' || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s

volumes:
  backup_nfs:
    driver: local
    driver_opts:
      type: nfs
      o: addr=${NFS_SERVER},${NFS_OPTIONS:-nfsvers=4,soft,rw}
      device: ":${NFS_PATH}"

networks:
  postgresql:
    external: true
    name: postgres-net
  mariadb:
    external: true
    name: mariadb-net
  quantdb:
    external: true
    name: quantdb-net
