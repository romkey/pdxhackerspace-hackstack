services:
  upsd:
    image: instantlinux/nut-upsd
    container_name: upsd
    hostname: upsd
    restart: unless-stopped
    privileged: true
    entrypoint: /etc/nut/local/entrypoint.sh
    devices:
#      - "${UPS_DEVICE}:/dev/ups0:rw"
       - /dev/bus/usb:/dev/bus/usb
    volumes:
      - ./config:/etc/nut/local
#      - /dev/bus/usb:/dev/bus/usb
    ports:
      - 3493:3493
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 2 bash -c '</dev/tcp/127.0.0.1/3493' || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
