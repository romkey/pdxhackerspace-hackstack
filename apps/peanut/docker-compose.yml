services:
  peanut:
    image: brandawg93/peanut:${IMAGE_VERSION:-latest}
    container_name: peanut
    hostname: peanut
    restart: unless-stopped
    volumes:
      - ./config:/config
#    ports:
#      - 8080:8080
    networks:
      - proxy
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

networks:
  proxy:
    name: nginx-proxy-net
    external: true
