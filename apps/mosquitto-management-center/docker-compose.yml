services:
  management-center:
    image: cedalo/management-center:${IMAGE_VERSION:-dev}
    container_name: management-center
    hostname: management-center
    restart: unless-stopped
    volumes:
      - ./config:/management-center/backend/config
#    ports:
#        - 8088:8088
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8088/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - proxy
      - mqtt
networks:
  proxy:
    external: true
    name: nginx-proxy-net
  mqtt:
    external: true
    name: mosquitto-net
