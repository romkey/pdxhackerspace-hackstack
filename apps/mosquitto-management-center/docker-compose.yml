services:
  management-center:
    image: cedalo/management-center:${IMAGE_VERSION:-dev}
    container_name: management-center
    hostname: management-center
    restart: unless-stopped
    volumes:
      - ./config:/management-center/backend/config
#    ports:
#        - 8088:8088
    env_file:
      - .env
    networks:
      - proxy
      - mqtt
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
networks:
  proxy:
    external: true
    name: nginx-proxy-net
  mqtt:
    external: true
    name: mosquitto-net
