services:
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:${IMAGE_VERSION:-server}
    container_name: llama-cpp
    hostname: llama-cpp
    restart: unless-stopped
    volumes:
      - ../../lib/llama-cpp/models:/models
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fSs http://127.0.0.1:8080/health >/dev/null 2>&1 || curl -fSs http://127.0.0.1:8080/v1/models >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
#   ports:
#     - 8080:8080
    networks:
      - llama
      - proxy

networks:
  llama:
    external: true
    name: llama-net
  proxy:
    external: true
    name: nginx-proxy-net
