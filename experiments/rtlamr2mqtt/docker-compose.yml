services:
  rtlamr2mqtt:
    image: allangood/rtlamr2mqtt:${IMAGE_VERSION:-latest}
    container_name: rtlamr2mqtt
    hostname: rtlamr2mqtt
    restart: unless-stopped
    env_file:
      - .env
    devices:
      - "${SDR_DEVICE}"
    volumes:
      - ./config/rtlamr2mqtt.yaml:/etc/rtlamr2mqtt.yaml:ro
      - ../../lib/rtlamr2mqtt/data:/var/lib/rtlamr2mqtt
    networks:
      - mqtt

networks:
  mqtt:
    external: true
    name: mosquitto-net
