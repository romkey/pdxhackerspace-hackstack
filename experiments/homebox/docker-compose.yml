services:
  homebox:
    image: ghcr.io/sysadminsmedia/homebox:${IMAGE_VERSION:-latest}
    container_name: homebox
    hostname: homebox
    restart: unless-stopped
    volumes:
      - ../../lib/homebox:/data
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:7745/api/v1/status >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
#   ports:
#     - 3100:7745
    networks:
      - proxy
      - db

networks:
  proxy:
    external: true
    name: nginx-proxy-net
  db:
    external: true
    name: postgres-net
