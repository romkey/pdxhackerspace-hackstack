services:
  nextcloud:
    image: nextcloud:${IMAGE_VERSION:-latest}
    container_name: nextcloud
    hostname: nextcloud
    restart: unless-stopped
    volumes:
      - ../../lib/nextcloud:/var/www/html
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/status.php -o /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
#   ports:
#     - 8080:80
    networks:
      - proxy
      - db

networks:
  proxy:
    external: true
    name: nginx-proxy-net
  db:
    external: true
    name: postgres-net
