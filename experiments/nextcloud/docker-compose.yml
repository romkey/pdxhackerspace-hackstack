services:
  nextcloud:
    image: nextcloud:${IMAGE_VERSION:-latest}
    container_name: nextcloud
    hostname: nextcloud
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ../../lib/nextcloud:/var/www/html
#    ports:
#      - 8080:80
    networks:
      - proxy
      - db

networks:
  proxy:
    external: true
    name: nginx-proxy-net
  db:
    external: true
    name: postgres-net
