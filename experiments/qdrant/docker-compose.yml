services:
  qdrant:
    image: qdrant/qdrant:${IMAGE_VERSION:-latest}
    container_name: qdrant
    hostname: qdrant
    restart: unless-stopped
    volumes:
      - ../../lib/qdrant:/qdrant/storage
#    ports:
#      - "6333:6333"   # REST API
#      - "6334:6334"   # gRPC
    networks:
      - qdrant
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  qdrant:
    name: qdrant-net
  proxy:
    name: nginx-proxy-net
    external: true
