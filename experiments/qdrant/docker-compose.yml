services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    hostname: qdrant
#    ports:
#      - "6333:6333"   # REST API
#      - "6334:6334"   # gRPC
    volumes:
      - ../../lib/qdrant:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - db

networks:
  db:
    name: qdrant-net
