services:
  osticket:
    image: tiredofit/osticket:${IMAGE_VERSION:-latest}
    container_name: osticket
    hostname: osticket
    restart: unless-stopped
    volumes:
      - ../../lib/osticket:/www/osticket
      - ../../log/osticket:/www/logs
#    ports:
#      - 8080:80
    env_file:
      - .env
    networks:
      - proxy
      - mariadb
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -nv --tries=1 --spider http://127.0.0.1/ || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

networks:
  proxy:
    external: true
    name: nginx-proxy-net
  mariadb:
    external: true
    name: mariadb-net
