services:
  telegraf:
    image: telegraf:${IMAGE_VERSION:-latest}
    container_name: telegraf
    hostname: telegraf
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config/telegraf.conf:/etc/telegraf/telegraf.conf
      - /:/hostfs
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - influxdb
      - db
      - mariadb

networks:
  influxdb:
    external: true
    name: influxdb-net
  db:
    external: true
    name: postgres-net
  mariadb:
    external: true
    name: mariadb-net
