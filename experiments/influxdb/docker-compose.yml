services:
  influxdb:
    image: influxdb:${IMAGE_VERSION:-2}
    container_name: influxdb
    hostname: influxdb
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ../../lib/influxdb:/var/lib/influxdb2
      - ./config:/etc/influxdb2
#    ports:
#      - 8086:8086
    networks:
      - influxdb

networks:
  influxdb:
    name: influxdb-net
