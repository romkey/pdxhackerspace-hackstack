services:
  chronograf:
    image: chronograf:${IMAGE_VERSION:-latest}
    container_name: chronograf
    hostname: chronograf
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ../../lib/chronograf:/var/lib/chronograf
#    command: chronograf --influxdb-url=http://influxdb:8086
#    ports:
#      - 8888:8888
    networks:
      - proxy
      - influxdb

networks:
  proxy:
    external: true
    name: nginx-proxy-net
  influxdb:
    external: true
    name: influxdb-net
