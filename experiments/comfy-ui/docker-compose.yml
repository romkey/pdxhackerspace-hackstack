# https://github.com/fcogomez/ComfyUI
services:
  comfy-ui:
    image: fcogomez/comfy-ui:${IMAGE_VERSION:-latest}
    container_name: comfy-ui
    hostname: comfy-ui
    restart: unless-stopped
    volumes:
      - ../../lib/comfy-ui:/storage
#    ports:
#      - 8188:8188
    networks:
      - proxy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: "${GPU_COUNT:-1}"
              capabilities: [gpu]

networks:
  proxy:
    external: true
    name: nginx-proxy-net
